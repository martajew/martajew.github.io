backend:
  name: github
  repo: martajew/martajew.github.io
  base_url: https://sveltia-cms-auth.adam-artajew.workers.dev

media_folder: /src/content/images

collections:
  - name: designs
    label: Designs
    label_singular: Design
    description: "Dynamic collection for design projects."
    folder: /src/content/designs
    media_folder: '{{media_folder}}/designs'
    identifier_field: slug
    summary: "{{sortDate | date('YYYY-MM-DD')}}: **{{title}}** ({{slug}}) {{isFeatured | ternary('_#featured_', '')}} {{isDraft | ternary('_#draft_', '')}}"
    sortable_fields:
      fields: [sortDate, title]
      default:
        field: sortDate
        direction: descending
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, comment: "Unique identifier used in the design's URL" }
      - label: Sort Date
        name: sortDate
        widget: datetime
        type: date
        default: "{{now}}"
        comment: "Used for display order only (newest first)."
      - { label: Client, name: client, widget: string }
      - label: Category
        name: category
        widget: select
        options: ["UI/UX Design", "Web Design", "Art Direction", "Product Design", "Branding"]
      - { label: Services, name: services, widget: string }
      - { label: Year, name: year, widget: string }
      - { label: Featured Image, name: featuredImage, widget: image }
      - { label: Image Two, name: imageTwo, widget: image }
      - { label: Image Three, name: imageThree, widget: image }
      - { label: Image Four, name: imageFour, widget: image }
      - { label: Payment Link, name: paymentLink, widget: string }
      - { label: Description, name: description, widget: markdown }
      - { label: Featured Design, name: isFeatured, widget: boolean, default: false, comment: "Show on home page" }
      - { label: Draft, name: isDraft, widget: boolean, default: false, comment: "Hide design from public site" }
      - { label: Body, name: body, widget: markdown }
  - name: pages
    label: Pages
    media_folder: '{{media_folder}}/pages'
    description: "Static pages for the website."
    files:
      - label: Home Page
        name: home
        file: /src/content/pages/home.md
        icon: home
        fields:
          - { label: Template, name: template, widget: hidden, default: home }
          - { label: Page Title, name: pageTitle, widget: string }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Intro Text, name: introText, widget: markdown }
              - { label: CTA Label, name: ctaLabel, widget: string }
              - { label: CTA Link, name: ctaHref, widget: string }
              - { label: Name, name: name, widget: string }
              - { label: Image, name: image, widget: image }
              - { label: Image Alt, name: imageAlt, widget: string }
          - label: Selected Designs
            name: selectedDesigns
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Button Label, name: buttonLabel, widget: string }
              - { label: Button Link, name: buttonHref, widget: string }
          - label: Services
            name: services
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Text, name: text, widget: markdown }
          - label: About Section
            name: aboutSection
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Lead Text, name: lead, widget: markdown }
              - { label: Body Text 1, name: bodyOne, widget: markdown }
              - { label: Body Text 2, name: bodyTwo, widget: markdown }
              - { label: Button Label, name: buttonLabel, widget: string }
              - { label: Button Link, name: buttonHref, widget: string }
              - { label: Image, name: image, widget: image }
              - { label: Image Alt, name: imageAlt, widget: string }
          - label: FAQ
            name: faq
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Text, name: text, widget: markdown }
      - label: About Page
        name: about
        file: /src/content/pages/about.md
        icon: info
        fields:
          - { label: Template, name: template, widget: hidden, default: about }
          - { label: Page Title, name: pageTitle, widget: string }
          - label: Intro
            name: intro
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Lead Text, name: lead, widget: markdown }
              - { label: Body Text, name: body, widget: markdown }
              - { label: Image, name: image, widget: image }
              - { label: Image Alt, name: imageAlt, widget: string }
          - label: Experience
            name: experience
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Place, name: place, widget: string }
                  - { label: Period, name: period, widget: string }
                  - { label: Text, name: text, widget: markdown }
          - label: Education
            name: education
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Place, name: place, widget: string }
                  - { label: Period, name: period, widget: string }
                  - { label: Text, name: text, widget: markdown }
      - label: Contact Page
        name: contact
        file: /src/content/pages/contact.md
        icon: mail
        fields:
          - { label: Template, name: template, widget: hidden, default: contact }
          - { label: Page Title, name: pageTitle, widget: string }
          - label: Intro
            name: intro
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Lead Text, name: lead, widget: markdown }
              - { label: Body Text 1, name: bodyOne, widget: markdown }
              - { label: Body Text 2, name: bodyTwo, widget: markdown }
          - label: Contact Details
            name: contactDetails
            widget: object
            fields:
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Contact, name: contact, widget: string }
      - label: Thank You Page
        name: thank-you
        file: /src/content/pages/thank-you.md
        icon: check
        fields:
          - { label: Template, name: template, widget: hidden, default: thank-you }
          - { label: Page Title, name: pageTitle, widget: string }
          - label: Intro
            name: intro
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Lead Text, name: lead, widget: markdown }
              - { label: Body Text, name: body, widget: markdown }
      - label: Not Found Page
        name: not-found
        file: /src/content/pages/not-found.md
        icon: warning
        fields:
          - { label: Template, name: template, widget: hidden, default: not-found }
          - { label: Page Title, name: pageTitle, widget: string }
          - { label: Heading, name: heading, widget: string }
          - { label: Message, name: message, widget: markdown }
          - { label: Button Label, name: buttonLabel, widget: string }
          - { label: Button Link, name: buttonHref, widget: string }
  - name: settings
    label: Settings
    description: "Website-wide settings."
    files:
      - label: Designs
        name: designs
        file: /src/content/settings/designs.md
        fields:
          - { label: Section, name: section, widget: hidden, default: designs }
          - { label: Pagination Page Size, name: paginationPageSize, widget: number, value_type: int, min: 1, max: 50, default: 6 }
      - label: Navigation
        name: navigation
        file: /src/content/settings/navigation.md
        fields:
          - { label: Section, name: section, widget: hidden, default: navigation }
          - label: Navigation Links
            name: navLinks
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: URL, name: href, widget: string }
      - label: Footer
        name: footer
        file: /src/content/settings/footer.md
        fields:
          - { label: Section, name: section, widget: hidden, default: footer }
          - { label: Socials Heading, name: socialsHeading, widget: string }
          - { label: Navigation Heading, name: navigationHeading, widget: string }
          - label: Social Links
            name: socials
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: URL, name: href, widget: string }
          - { label: Copyright, name: copyright, widget: string }
          - { label: Credits Prefix, name: creditsPrefix, widget: string }
          - { label: Built With Label, name: builtWithLabel, widget: string }
          - { label: Built With URL, name: builtWithHref, widget: string }
          - { label: Built By Label, name: builtByLabel, widget: string }
          - { label: Built By URL, name: builtByHref, widget: string }
      - label: Orders
        name: orders
        file: /src/content/settings/orders.md
        fields:
          - { label: Section, name: section, widget: hidden, default: orders }
          - { label: Payment Button Label, name: paymentButtonLabel, widget: string, default: Order Now }
