backend:
  name: github
  repo: martajew/martajew.github.io
  base_url: https://sveltia-cms-auth.adam-artajew.workers.dev

media_folder: /content/media

collections:
  - name: pages
    label: Pages
    label_singular: Page
    folder: /content/pages
    media_folder: '{{media_folder}}/pages'
    summary: "{{title}} ({{permalink}}) {{comment | ternary('_', '')}}{{comment}}{{comment | ternary('_', '')}}"
    description: Composable pages built from reusable blocks.
    icon: web
    fields:
      - {label: Title, name: title, widget: string, comment: Used for browser title only.}
      - {label: Permalink, name: permalink, widget: string, comment: "Permanent static hyperlink to a page. Use 'home' for /."}
      - {label: Comment, name: comment, widget: string, comment: Optional page description., required: false}
      - label: Blocks
        name: blocks
        label_singular: Block
        widget: list
        required: false
        collapsed: true
        types:
          - label: Title
            name: heading_block
            fields:
              - {label: Title, name: title, widget: string}
          - label: Intro
            name: intro_block
            fields:
              - {label: Heading, name: heading, widget: string}
              - {label: Lead, name: lead, widget: string}
              - {label: Body, name: body, widget: markdown}
              - {label: Button, name: button, widget: string, required: false}
              - {label: Link, name: link, widget: string, required: false}
              - {label: Alignment, name: alignment, widget: select, options: [Left, Center, Right], default: Left}
          - label: Hero
            name: hero_block
            fields:
              - {label: Intro, name: intro, widget: markdown, required: false}
              - {label: Button, name: button, widget: string, required: false}
              - {label: Link, name: link, widget: string, required: false}
              - {label: Name, name: name, widget: string}
              - {label: Lead, name: lead, widget: string, required: false}
              - {label: Body, name: body, widget: markdown, required: false}
              - {label: Image, name: image, widget: image}
          - label: Callout
            name: callout_block
            fields:
              - {label: Name, name: name, widget: string}
              - {label: Lead, name: lead, widget: string}
              - {label: Body, name: body, widget: markdown}
              - {label: Button, name: button, widget: string, required: false}
              - {label: Link, name: link, widget: string, required: false}
              - {label: Image, name: image, widget: image}
          - label: Accordion
            name: accordion_block
            fields:
              - {label: Heading, name: heading, widget: string}
              - label: Items
                name: items
                widget: list
                fields:
                  - {label: Title, name: title, widget: string}
                  - {label: First, name: first, widget: string}
                  - {label: Second, name: second, widget: string}
                  - {label: Text, name: text, widget: markdown}
          - label: Numbered Accordion
            name: numbered_accordion_block
            fields:
              - {label: Heading, name: heading, widget: string}
              - label: Items
                name: items
                widget: list
                fields:
                  - {label: Title, name: title, widget: string}
                  - {label: Text, name: text, widget: markdown}
          - label: Contacts
            name: contacts_block
            fields:
              - label: Items
                name: items
                widget: list
                fields:
                  - {label: Title, name: title, widget: string}
                  - {label: Contact, name: contact, widget: string}
                  - {label: URL, name: href, widget: string, required: false, comment: 'Optional link (e.g. mailto: or tel:).'}
          - label: Featured Designs
            name: featured_designs_block
            fields:
              - {label: Heading, name: heading, widget: string}
              - {label: Button, name: button, widget: string}
              - {label: Link, name: link, widget: string}
          - label: All Designs
            name: all_designs_block
            fields:
              - {label: Heading, name: heading, widget: string}
              - {label: Page Size, name: pageSize, widget: number}
          - label: Design Details
            name: design_details_block
            fields:
              - {label: Payment Button Label, name: paymentButtonLabel, widget: string}

  - name: designs
    label: Designs
    label_singular: Design
    description: Managable collection of designs.
    folder: /content/designs
    media_folder: '{{media_folder}}/designs'
    icon: design_services
    summary: "{{sortDate | date('YYYY-MM-DD')}}: {{isFeatured | ternary('**', '')}}{{title}}{{isFeatured | ternary('**', '')}} ({{permalink}}) {{isFeatured | ternary('_#featured_', '')}} {{isDraft | ternary('_#draft_', '')}}"
    sortable_fields:
      fields: [sortDate, title]
      default:
        field: sortDate
        direction: descending
    view_groups:
      - {field: category, label: Category}
      - {field: isFeatured, label: Featured}
      - {field: isDraft, label: Draft}
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Permalink, name: permalink, widget: string, comment: Permanent static hyperlink to the design.}
      - label: Sort Date
        name: sortDate
        widget: datetime
        type: date
        default: '{{now}}'
        comment: Used for display order (newest first).
      - label: Details Page
        name: detailsPage
        comment: "Choose existing page to use as the design's details page. Selected page should include the Design Details block."
        widget: relation
        collection: pages
        display_fields: ['{{title}} ({{permalink}}) {{comment}}']
      - {label: Client, name: client, widget: string}
      - label: Category
        name: category
        comment: 'Manage available categories in [Settings > Designs](#/collections/settings/entries/designs).'
        widget: relation
        collection: settings
        file: designs
        value_field: '{{categories.*}}'
        display_fields: ['{{categories.*}}']
      - {label: Services, name: services, widget: string}
      - {label: Featured Image, name: featuredImage, widget: image}
      - {label: Image Two, name: imageTwo, widget: image}
      - {label: Image Three, name: imageThree, widget: image}
      - {label: Image Four, name: imageFour, widget: image}
      - {label: Payment Link, name: paymentLink, widget: string}
      - {label: Description, name: description, widget: markdown}
      - {label: Featured Design, name: isFeatured, widget: boolean, default: false, comment: Show on home page.}
      - {label: Draft, name: isDraft, widget: boolean, default: false, comment: Hide design from public site.}
      - {label: Body, name: body, widget: markdown}

  - name: settings
    label: Settings
    description: Website-wide settings.
    icon: settings
    media_folder: '{{media_folder}}/settings'
    files:
      - label: Layout
        name: layout
        file: /content/settings/layout.md
        icon: view_quilt
        fields:
          - {label: Section, name: section, widget: hidden, default: layout}
          - {label: Main Page Title, name: mainPageTitle, widget: string}
          - {label: Sans Font Family (Google), name: fontSansFamily, widget: string, required: false, comment: 'Example: Road Rage (search more on [Google Fonts](https://fonts.google.com/))'}
          - {label: Sans Font Scale, name: fontSansScale, widget: number, value_type: float, step: 0.1, required: false, default: 1, comment: '1 = unchanged. Lower shrinks, higher enlarges.'}
          - {label: Mono Font Family (Google), name: fontMonoFamily, widget: string, required: false, comment: 'Example: JetBrains Mono (search more on [Google Fonts](https://fonts.google.com/))'}
          - {label: Mono Font Scale, name: fontMonoScale, widget: number, value_type: float, step: 0.1, required: false, default: 1, comment: '1 = unchanged. Lower shrinks, higher enlarges.'}
          - {label: Primary Color, name: primaryColor, widget: color, enableAlpha: true, allowInput: true, comment: 'Primary text, headings, borders, strong dark UI'}
          - {label: Secondary Color, name: secondaryColor, widget: color, enableAlpha: true, allowInput: true, comment: Muted/metadata text and hover states}
          - {label: Contrast Color, name: contrastColor, widget: color, enableAlpha: true, allowInput: true, comment: Light contrast for text-on-dark and light surfaces}
          - {label: Favicon Image, name: faviconImage, widget: image, required: false, comment: Favicon image used in browser tab.}
          - {label: Background Image, name: backgroundImage, widget: image, required: false}
          - {label: Design Tile Image, name: designTileImage, widget: image, required: false}
          - {label: Decorator Image, name: decoratorImage, widget: image, required: false}
          - {label: Symbol Image, name: symbolImage, widget: image, required: false}
          - {label: Copyright, name: copyright, widget: markdown, required: false, comment: Copyright notice used in page footer.}
      - label: Navigation
        name: navigation
        file: /content/settings/navigation.md
        icon: menu
        fields:
          - {label: Section, name: section, widget: hidden, default: navigation}
          - label: 404 Page
            name: notFoundPage
            widget: relation
            collection: pages
            display_fields: ['{{title}} ({{permalink}}) {{comment}}']
            comment: Choose which existing page is used for 404 responses.
          - {label: Navigation Heading, name: navigationHeading, widget: string, comment: Used in page footer.}
          - label: Navigation Links
            name: navigationLinks
            widget: list
            comment: Used in page header and footer.
            fields:
              - {label: Title, name: title, widget: string}
              - {label: URL, name: href, widget: string}
          - {label: Socials Heading, name: socialsHeading, widget: string, comment: Used in footer.}
          - label: Social Links
            name: socialsLinks
            widget: list
            comment: Used in page footer.
            fields:
              - {label: Title, name: title, widget: string}
              - {label: URL, name: href, widget: string}
      - label: Designs
        name: designs
        file: /content/settings/designs.md
        icon: design_services
        fields:
          - {label: Section, name: section, widget: hidden, default: designs}
          - {label: Categories, name: categories, widget: list, comment: Put one category per line.}
