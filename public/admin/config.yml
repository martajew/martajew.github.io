backend:
  name: github
  repo: martajew/martajew.github.io
  base_url: https://sveltia-cms-auth.adam-artajew.workers.dev

media_folder: /src/content/images

collections:
  - name: pages
    label: Pages
    label_singular: Page
    folder: /src/content/pages
    media_folder: '{{media_folder}}/pages'
    identifier_field: slug
    summary: "{{title}} ({{slug}})"
    description: "Composable pages built from reusable blocks."
    icon: web
    fields:
      - { label: Title, name: title, widget: string, comment: "Used for browser title only." }
      - { label: Slug, name: slug, widget: string, comment: "Unique page identifier used in URL. Use 'home' for /." }
      - label: Blocks
        name: blocks
        label_singular: Block
        widget: list
        collapsed: true
        types:
          - label: Title
            name: heading_block
            fields:
              - { label: Title, name: title, widget: string }
          - label: Intro
            name: intro_block
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Lead, name: lead, widget: string }
              - { label: Body, name: body, widget: markdown }
              - { label: Button, name: button, widget: string, required: false }
              - { label: Link, name: link, widget: string, required: false }
          - label: Hero
            name: hero_block
            fields:
              - { label: Intro, name: intro, widget: string }
              - { label: Button, name: button, widget: string }
              - { label: Link, name: link, widget: string }
              - { label: Name, name: name, widget: string }
              - { label: Lead, name: lead, widget: string }
              - { label: Body, name: body, widget: markdown }
              - { label: Image, name: image, widget: image }
          - label: Callout
            name: callout_block
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Lead, name: lead, widget: string }
              - { label: Body, name: body, widget: markdown }
              - { label: Button, name: button, widget: string }
              - { label: Link, name: link, widget: string }
              - { label: Image, name: image, widget: image }
          - label: Accordion
            name: accordion_block
            fields:
              - { label: Heading, name: heading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: First, name: first, widget: string }
                  - { label: Second, name: second, widget: string }
                  - { label: Text, name: text, widget: markdown }
          - label: Numbered Accordion
            name: numbered_accordion_block
            fields:
              - { label: Heading, name: heading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Text, name: text, widget: markdown }
          - label: Contacts
            name: contacts_block
            fields:
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Contact, name: contact, widget: string }
                  - { label: URL, name: href, widget: string, required: false, comment: "Optional link (e.g. mailto: or tel:)" }
          - label: Featured Designs
            name: featured_designs_block
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Button, name: button, widget: string }
              - { label: Link, name: link, widget: string }
          - label: All Designs
            name: all_designs_block
            fields:
              - { label: Heading, name: heading, widget: string }

  - name: designs
    label: Designs
    label_singular: Design
    description: "Managable collection of designs."
    folder: /src/content/designs
    media_folder: '{{media_folder}}/designs'
    icon: design_services
    identifier_field: slug
    summary: "{{sortDate | date('YYYY-MM-DD')}}: {{isFeatured | ternary('**', '')}}{{title}}{{isFeatured | ternary('**', '')}} ({{slug}}) {{isFeatured | ternary('_#featured_', '')}} {{isDraft | ternary('_#draft_', '')}}"
    sortable_fields:
      fields: [sortDate, title]
      default:
        field: sortDate
        direction: descending
    view_groups:
      - { field: category, label: Category }
      - { field: isFeatured, label: Featured }
      - { field: isDraft, label: Draft }
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, comment: "Unique identifier used in the design's URL" }
      - label: Sort Date
        name: sortDate
        widget: datetime
        type: date
        default: "{{now}}"
        comment: "Used for display order only (newest first)."
      - { label: Client, name: client, widget: string }
      - label: Category
        name: category
        comment: "Manage available categories in [Settings > Designs](#/collections/settings/entries/designs)"
        widget: relation
        collection: settings
        file: designs
        value_field: "{{categories.*}}"
        display_fields: ["{{categories.*}}"]
      - { label: Services, name: services, widget: string }
      - { label: Featured Image, name: featuredImage, widget: image }
      - { label: Image Two, name: imageTwo, widget: image }
      - { label: Image Three, name: imageThree, widget: image }
      - { label: Image Four, name: imageFour, widget: image }
      - { label: Payment Link, name: paymentLink, widget: string }
      - { label: Description, name: description, widget: markdown }
      - { label: Featured Design, name: isFeatured, widget: boolean, default: false, comment: "Show on home page" }
      - { label: Draft, name: isDraft, widget: boolean, default: false, comment: "Hide design from public site" }
      - { label: Body, name: body, widget: markdown }

  - name: settings
    label: Settings
    description: "Website-wide settings."
    icon: settings
    files:
      - label: Layout
        name: layout
        file: /src/content/settings/layout.md
        icon: view_quilt
        fields:
          - { label: Section, name: section, widget: hidden, default: layout }
          - { label: Main Page Title, name: mainPageTitle, widget: string }
          - { label: Socials Heading, name: socialsHeading, widget: string }
          - { label: Navigation Heading, name: navigationHeading, widget: string }
          - label: Social Links
            name: socials
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: URL, name: href, widget: string }
          - { label: Copyright, name: copyright, widget: string }
          - { label: Credits Prefix, name: creditsPrefix, widget: string }
          - { label: Built With Label, name: builtWithLabel, widget: string }
          - { label: Built With URL, name: builtWithHref, widget: string }
          - { label: Built By Label, name: builtByLabel, widget: string }
          - { label: Built By URL, name: builtByHref, widget: string }
      - label: Navigation
        name: navigation
        file: /src/content/settings/navigation.md
        icon: menu
        fields:
          - { label: Section, name: section, widget: hidden, default: navigation }
          - label: Navigation Links
            name: navLinks
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: URL, name: href, widget: string }
      - label: Designs
        name: designs
        file: /src/content/settings/designs.md
        icon: design_services
        fields:
          - { label: Section, name: section, widget: hidden, default: designs }
          - { label: Categories, name: categories, widget: list, comment: "Put one category per line." }
          - { label: Payment Button Label, name: paymentButtonLabel, widget: string }
