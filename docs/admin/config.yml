backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: media
public_folder: /media

collections:
  - name: posts
    label: Posts
    folder: content/posts
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Body, name: body, widget: markdown}
  - name: pages
    label: Pages
    folder: content/pages
    create: true
    slug: '{{slug}}'
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Body, name: body, widget: markdown}
